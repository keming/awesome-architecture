# Awesome Architecture 教学站 —— 独立端口 8090,不影响现有 80/443 站点
# 部署:scp 到 /etc/nginx/sites-available/ 并软链到 sites-enabled/,nginx -t 通过后 reload
server {
    listen 8090;
    listen [::]:8090;
    server_name _;

    root /var/www/awesome-architecture;
    index index.html;
    charset utf-8;

    access_log /var/log/nginx/awesome-architecture.access.log;
    error_log  /var/log/nginx/awesome-architecture.error.log;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # VitePress cleanUrls:无扩展名 URL 回退到 .html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
    error_page 404 /404.html;

    # 带哈希的静态资源长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
